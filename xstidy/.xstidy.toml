# xstidy does not run unless an X# project provides this file.
# This configuration file defines the rules and settings used to analyze and improve X# code.

[Comments]
AcceptAboveAttributes = true
AcceptAboveStatement = true
LintCommentedCode = false

[Docs]
ValidIdents = [
    "API",
    "Arch",
    "CLI",
    "JSON",
    "Linux",
    "Picom",
    "Qtile",
    "TOML",
    "Wayland",
    "X11",
    "YAML",
    "...",
]

[Docs.Missing]
AllowUnused = false
InProjectItems = false

[Allow]
ComparisonToZero = true
ExactRepetitions = true
MixedUninlinedFormatArgs = true
OneHashInRawStrings = false
PrivateGroupInception = false
UselessVectorInTests = true

[Allowed.Naming]
IdentsBelowMinChars = ["i", "j", "k", "n", "r", "w", "x", "y", "z"]
Prefixes = ["to", "as", "into", "from", "try_into", "try_from"]
Scripts = ["Latin"]

[Disallowed]
Fields = []
Methods = []
Names = ["foo", "baz", "quux"]
Types = []

[Lint]
GroupedLateInit = true
IncompatibleProjectVersionInTests = false
InconsistentFieldInitializers = false
PrivateItems = false
AvoidBreakingExportedAPI = true
IgnorePublishMetadata = false
SuppressRestrictionLintInConst = false

[Analysis]
Enabled = true
Profile = "Strict"
InheritParentConfig = false
RespectFormatterConfig = true
UseColor = true

[Analysis.Scope]
Include = ["**/*.xs"]

Exclude = [
    "target/**",
    "build/**",
    "dist/**",
    "vendor/**",
    "third_party/**",
    "external/**",
    "generated/**",
]

[Analysis.Diagnostics]
WarningsAsErrors = [
    "correctness",
    "security",
    "reliability",
    "lifetime",
    "data-flow",
]

ShowExternalDiagnostics = false
ShowGeneratedDiagnostics = false
Deduplicate = true
GroupByRule = true
IncludeExplanations = true
IncludeSuggestedFixes = true
MaxDiagnostics = 0

[Analysis.Fixes]
Apply = false
SafeOnly = true
FormatAroundFixes = true
ExportFixes = true
FixNotes = true
RequireHumanReview = true

[Analysis.Execution]
Incremental = true
Parallel = true
CacheResults = true
FailFast = false
TimeoutSeconds = 0

[Analysis.RuleSets]
Correctness = true
Security = true
Reliability = true
Performance = true
Maintainability = true
Readability = true
Complexity = true
DeadCode = true
Duplication = true
Documentation = true
APIStability = true
Portability = true
ResourceUsage = true
ErrorHandling = true

[Analysis.Correctness]
UnreachableCode = true
InvalidComparison = true
SuspiciousAssignment = true
UninitializedValue = true
ImpossibleCondition = true
DuplicateCondition = true
RedundantCondition = true
InvalidStateTransition = true

[Analysis.Security]
UnsafeInputHandling = true
UncheckedReturnValue = true
PathTraversal = true
InjectionRisk = true
WeakRandomness = true
SensitiveDataExposure = true
UnsafeDeserialization = true
HardcodedCredential = true

[Analysis.Performance]
UnnecessaryAllocation = true
UnnecessaryCopy = true
InefficientLookup = true
RepeatedWork = true
LargeObjectPassedByValue = true
AvoidableBoxing = true
RedundantConversion = true

[Analysis.Maintainability]
DeadCode = true
DuplicateCode = true
OverlyComplexExpression = true
OverlyLongFunction = true
TooManyParameters = true
DeepNesting = true
LargeType = true
UnclearControlFlow = true
HiddenSideEffect = true

[Analysis.Readability]
MisleadingIndentation = true
RedundantControlFlow = true
RedundantDeclaration = true
RedundantConversion = true
SimplifyBooleanExpression = true
PreferEarlyReturn = true
ConsistentNaming = true
ConsistentVisibility = true

[Naming]
EnumVariantNameThreshold = 3
MinIdentCharsThreshold = 1
SingleCharBindingNamesThreshold = 4
FieldNameThreshold = 3
UpperCaseAcronymsAggressive = false

[Literals]
ConstDigitsThreshold = 30
RepresentationThreshold = 16384
UnreadableFractions = true
VerboseBitMaskThreshold = 1

[Limits.Size]
Array = 16384
Variant = 200
Future = 16384
LargeError = 128
MaxInputFile = 1000000
PassByValue = 256
Stack = 512000
TooLargeForStack = 200
UnnecessaryBox = 128
BoxedCollection = 4096

[Limits.Complexity]
Cognitive = 25
ExcessiveNesting = 0
MaxBounds = 3
Type = 250

[Limits.Functions]
MaxBoolParams = 3
MaxBoolFields = 3
TooManyArguments = 7
TooManyLines = 100

[Limits.Patterns]
MaxSuggestedPatternLength = 3

[Fields]
PublicUnderscoreBehavior = "PubliclyExported"

[Errors.Large]
Ignored = []
