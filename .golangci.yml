# yaml-language-server: $schema=https://golangci-lint.run/jsonschema/golangci.jsonschema.json
---
version: "2"

run:
  timeout: 5m
  relative-path-mode: gomod
  tests: true
  allow-parallel-runners: true

linters:
  default: standard
  enable:
    - bodyclose
    - copyloopvar
    - errorlint
    - gocritic
    - gosec
    - misspell
    - modernize
    - nilerr
    - nolintlint
    - predeclared
    - revive
    - unconvert
    - usestdlibvars
    - whitespace

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true

    govet:
      enable-all: true
      disable:
        - fieldalignment

    misspell:
      locale: US

    nolintlint:
      require-explanation: true
      require-specific: true

    revive:
      confidence: 0.8

  exclusions:
    generated: strict
    warn-unused: true
    presets:
      - common-false-positives
      - std-error-handling

formatters:
  enable:
    - gofmt
    - goimports

  exclusions:
    generated: strict
    warn-unused: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

output:
  sort-order:
    - file
    - linter
  show-stats: true
