name: CI

on:
  pull_request:
  push:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lukka/get-cmake@v3.31.7
      - uses: dtolnay/rust-toolchain@nightly-2026-07-10
      - name: Install native toolchain
        run: sudo apt-get update && sudo apt-get install --yes clang lld llvm ninja-build
      - name: Configure C23 debug build
        run: cmake --preset clang-debug
      - name: Test C23 debug build
        run: ulimit -v 2097152; cmake --build --preset clang-debug && ctest --preset clang-debug --output-on-failure
      - name: Configure sanitizer build
        run: cmake --preset clang-sanitize
      - name: Test sanitizer build
        run: cmake --build --preset clang-sanitize && ctest --preset clang-sanitize --output-on-failure
      - name: Check Rust formatting
        run: cargo +nightly fmt --manifest-path xslang/Cargo.toml --check
      - name: Test Rust compiler core
        run: ulimit -v 2097152; cargo +nightly test --manifest-path xslang/Cargo.toml
      - name: Check patch hygiene
        run: git diff --check
