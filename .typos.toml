[files]
extend-exclude = [
    "target/",
    "**/target/**",
    "Cargo.lock",
    "flake.lock",
    "package-lock.json",
    "pnpm-lock.yaml",
    "yarn.lock",
    "vendor/",
    "**/vendor/**",
    "dist/",
    "build/",
    "coverage/",
    ".nixos-vm/",
    ".direnv/",
    ".devenv/",
    ".cache/",
    "*.png",
    "*.jpg",
    "*.jpeg",
    "*.gif",
    "*.webp",
    "*.ico",
    "*.svg",
    "*.pdf",
    "*.ttf",
    "*.otf",
    "*.woff",
    "*.woff2",
    "*.min.js",
    "*.min.css",
    "*.patch",
    "*.diff",
]

[default]
binary = false
check-filename = true
check-file = true
unicode = true
locale = "en"

extend-ignore-re = [
    "(?Rm)^.*(#|//)\\s*spellchecker:disable-line$",
    "(?Rm)^\\s*(#|//)\\s*spellchecker:ignore-next-line\\n.*$",
    "(?s)(#|//)\\s*spellchecker:off.*?\\n\\s*(#|//)\\s*spellchecker:on",
    "https?://[^\\s)>\"]+",
    "\\b[0-9a-fA-F]{32,}\\b",
    "\\b[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}\\b",
    "\\b[A-Za-z0-9+/]{40,}={0,2}\\b",
    "ssh-(rsa|ed25519)\\s+[A-Za-z0-9+/=]+",
    "(?s)-----BEGIN PGP .*?-----END PGP .*?-----",
]

extend-ignore-identifiers-re = [
    "^[a-zA-Z]{1,4}$",
    "^[a-zA-Z_]*ptr[a-zA-Z_]*$",
    "^[a-zA-Z_]*fd[a-zA-Z_]*$",
    "^[a-zA-Z_]*pid[a-zA-Z_]*$",
    "^[a-zA-Z_]*uid[a-zA-Z_]*$",
    "^[a-zA-Z_]*gid[a-zA-Z_]*$",
    "^[a-zA-Z_]*cfg[a-zA-Z_]*$",
    "^[a-zA-Z_]*ctx[a-zA-Z_]*$",
    "^[a-zA-Z_]*idx[a-zA-Z_]*$",
    "^[a-zA-Z_]*buf[a-zA-Z_]*$",
    "^[a-zA-Z_]*str[a-zA-Z_]*$",
    "\\bXCB_[A-Z0-9_]+\\b",
    "\\bGLX_[A-Z0-9_]+\\b",
    "\\bEGL_[A-Z0-9_]+\\b",
    "\\bWL_[A-Z0-9_]+\\b",
    "\\bXDG_[A-Z0-9_]+\\b",
    "\\b_NET_[A-Z0-9_]+\\b",
    "\\bWM_[A-Z0-9_]+\\b",
    "\\bTLS_[A-Z0-9_]+\\b",
    "\\bSSL_[A-Z0-9_]+\\b",
    "\\bSHA[0-9_]*\\b",
]

extend-ignore-words-re = [
    "^[A-Za-z]{1,3}$",
    "(?i)^x11$",
    "(?i)^xcb$",
    "(?i)^xlib$",
    "(?i)^xwayland$",
    "(?i)^wayland$",
    "(?i)^wlroots$",
    "(?i)^glx$",
    "(?i)^egl$",
    "(?i)^vulkan$",
    "(?i)^mesa$",
    "(?i)^qtile$",
    "(?i)^picom$",
    "(?i)^leftwm$",
    "(?i)^hyprland$",
    "(?i)^niri$",
    "(?i)^ron$",
    "(?i)^kdl$",
    "(?i)^serde$",
    "(?i)^clippy$",
    "(?i)^rustfmt$",
    "(?i)^rustsec$",
    "(?i)^toml$",
]

[default.extend-words]
Qtile = "Qtile"
picom = "picom"
LeftWM = "LeftWM"
Hyprland = "Hyprland"
Wayland = "Wayland"
XWayland = "XWayland"
Xlib = "Xlib"
XCB = "XCB"
GLX = "GLX"
EGL = "EGL"
wlroots = "wlroots"
Niri = "Niri"
MangoWM = "MangoWM"
Serde = "Serde"
serde = "serde"
Clippy = "Clippy"
rustfmt = "rustfmt"
RustSec = "RustSec"
RON = "RON"
KDL = "KDL"
TOML = "TOML"
config = "config"
configs = "configs"
deconfig = "deconfig"
compositor = "compositor"
compositors = "compositors"
keybind = "keybind"
keybinds = "keybinds"
keybinding = "keybinding"
keybindings = "keybindings"
autostart = "autostart"
fullscreen = "fullscreen"
workspace = "workspace"
workspaces = "workspaces"
