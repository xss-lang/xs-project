[files]
extend-exclude = [
    "target/",
    "**/target/**",
    "Cargo.lock",
    "flake.lock",
    "package-lock.json",
    "pnpm-lock.yaml",
    "yarn.lock",
    "vendor/",
    "**/vendor/**",
    "dist/",
    "build/",
    "coverage/",
    ".direnv/",
    ".cache/",
    "*.png",
    "*.jpg",
    "*.jpeg",
    "*.gif",
    "*.webp",
    "*.ico",
    "*.svg",
    "*.pdf",
    "*.ttf",
    "*.otf",
    "*.woff",
    "*.woff2",
    "*.min.js",
    "*.min.css",
    "*.patch",
    "*.diff",
]

[default]
binary = false
check-filename = true
check-file = true
unicode = true
locale = "en"

extend-ignore-re = [
    "(?Rm)^.*(#|//)\\s*spellchecker:disable-line$",
    "(?Rm)^\\s*(#|//)\\s*spellchecker:ignore-next-line\\n.*$",
    "(?s)(#|//)\\s*spellchecker:off.*?\\n\\s*(#|//)\\s*spellchecker:on",
    "https?://[^\\s)>\"]+",
    "\\b[0-9a-fA-F]{32,}\\b",
    "\\b[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}\\b",
    "\\b[A-Za-z0-9+/]{40,}={0,2}\\b",
    "ssh-(rsa|ed25519)\\s+[A-Za-z0-9+/=]+",
    "(?s)-----BEGIN PGP .*?-----END PGP .*?-----",
]

extend-ignore-identifiers-re = [
    "^[a-zA-Z]{1,4}$",
    "^[a-zA-Z_]*ptr[a-zA-Z_]*$",
    "^[a-zA-Z_]*fd[a-zA-Z_]*$",
    "^[a-zA-Z_]*pid[a-zA-Z_]*$",
    "^[a-zA-Z_]*uid[a-zA-Z_]*$",
    "^[a-zA-Z_]*gid[a-zA-Z_]*$",
    "^[a-zA-Z_]*cfg[a-zA-Z_]*$",
    "^[a-zA-Z_]*ctx[a-zA-Z_]*$",
    "^[a-zA-Z_]*idx[a-zA-Z_]*$",
    "^[a-zA-Z_]*buf[a-zA-Z_]*$",
    "^[a-zA-Z_]*str[a-zA-Z_]*$",
    "\\bLLVM[A-Z0-9_]*\\b",
    "\\bXS_[A-Z0-9_]+\\b",
    "\\bTLS_[A-Z0-9_]+\\b",
    "\\bSSL_[A-Z0-9_]+\\b",
    "\\bSHA[0-9_]*\\b",
]

extend-ignore-words-re = [
    "^[A-Za-z]{1,3}$",
    "(?i)^vulkan$",
    "(?i)^ron$",
    "(?i)^kdl$",
    "(?i)^serde$",
    "(?i)^clippy$",
    "(?i)^rustfmt$",
    "(?i)^rustsec$",
    "(?i)^toml$",
]

[default.extend-words]
CMake = "CMake"
CMakeLists = "CMakeLists"
CTest = "CTest"
Clang = "Clang"
clangd = "clangd"
LLVM = "LLVM"
LLD = "LLD"
NASM = "NASM"
XLIL = "XLIL"
HIR = "HIR"
MIR = "MIR"
JIT = "JIT"
AOT = "AOT"
ABI = "ABI"
API = "API"
AST = "AST"
CLI = "CLI"
UTF = "UTF"
XSPROJ = "XSPROJ"
xsproj = "xsproj"
xsfmt = "xsfmt"
xstidy = "xstidy"
Codegen = "Codegen"
codegen = "codegen"
monomorphization = "monomorphization"
monomorphize = "monomorphize"
Monomorfizasyon = "Monomorfizasyon"
borrow = "borrow"
namespace = "namespace"
namespaces = "namespaces"
lowering = "lowering"
runtime = "runtime"
vtable = "vtable"
itable = "itable"
endianness = "endianness"
toolchain = "toolchain"
Serde = "Serde"
serde = "serde"
TypeScript = "TypeScript"
Clippy = "Clippy"
rustfmt = "rustfmt"
RustSec = "RustSec"
RON = "RON"
KDL = "KDL"
TOML = "TOML"
config = "config"
configs = "configs"
deconfig = "deconfig"
workspace = "workspace"
workspaces = "workspaces"
